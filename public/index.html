<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDV Insumos - Acceso</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="text-center mb-1">PDV de insumos agricolas</h4>
          <p class="text-center text-muted mb-4">Iniciar sesion</p>
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input id="usuario" type="text" class="form-control" autocomplete="username">
          </div>
          <div class="mb-3">
            <label class="form-label">Clave</label>
            <input id="clave" type="password" class="form-control" autocomplete="current-password">
          </div>
          <div id="msg" class="text-danger small mb-2"></div>
          <button id="btnEntrar" class="btn btn-primary w-100">Entrar</button>
          <p class="text-muted small mt-3 mb-0">Acceso de prueba: admin / admin123</p>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/login.js"></script>
</body>
</html>
